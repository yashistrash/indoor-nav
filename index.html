<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Nila Square · Maps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1A73E8; --blue-route:#4285F4; --blue-route-dk:#185ABC;
  --nav-route:#4353E8; --nav-route-dk:#2B2FA8;
  --teal:#0C5A4E; --amber:#B06000; --red:#EA4335;
  --ink:#202124; --gray:#5F6368; --line:#E8EAED; --chipbg:#F1F3F4;
  --surface:#FFFFFF; --border:#DADCE0; --selbg:#E8F0FE; --startdis:#AECBFA;
  --land:#DCEDD8; --plot:#EAE9E4; --slab:#F2F0EB; --slabedge:#DBD8D1;
  --road:#DDE2E6; --roadcase:#CBD1D7; --outroad:#D2D8DC;
  --btop:#FBFBFA; --bface:#DDE1E4;
  --contop:#EFF1F3; --conface:#D3D8DD; --conink:#80868B; --maptext:#5F6368;
  --sky:#CFE0EE; --fpfloor:#E7E4DD; --fpface:#EFF1F2; --fpstroke:#D3D7DB;
  --shadow:0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
}
:root[data-theme="dark"]{
  --nav-route:#5B67F0; --nav-route-dk:#39418F;
  --amber:#FDD663;
  --ink:#E8EAED; --gray:#9AA0A6; --line:#3C4043; --chipbg:#303134;
  --surface:#202124; --border:#5F6368; --selbg:#1F3454; --startdis:#3C5A85;
  --land:#17232E; --plot:#1E2A36; --slab:#243040; --slabedge:#1A2430;
  --road:#2E3B4A; --roadcase:#1F2937; --outroad:#26313D;
  --btop:#2C3947; --bface:#202B37;
  --contop:#32404E; --conface:#26313D; --conink:#9AA0A6; --maptext:#9AA0A6;
  --sky:#0D1722; --fpfloor:#1B2530; --fpface:#2A3745; --fpstroke:#3A4857;
  --shadow:0 1px 3px rgba(0,0,0,.5), 0 4px 8px 3px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Roboto',system-ui,-apple-system,sans-serif;background:var(--land);color:var(--ink)}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
#app{position:fixed;inset:0;height:100dvh;overflow:hidden}

#mapwrap{position:absolute;inset:0;touch-action:none}
#map{display:block;width:100%;height:100%}

/* mode visibility */
#app.preview .navonly{display:none}
#app.nav .previewonly{display:none}

/* ---------- floating buttons ---------- */
.fab{width:52px;height:52px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow);
  display:grid;place-items:center;color:var(--gray)}
.fab:active{background:var(--chipbg)}
.fabstack{position:absolute;right:12px;bottom:220px;display:flex;flex-direction:column;gap:14px;z-index:20}
#layersBtn{position:absolute;right:12px;top:max(150px, calc(env(safe-area-inset-top) + 140px));z-index:20}
.levelpick{position:absolute;left:12px;display:flex;flex-direction:column;background:var(--surface);border-radius:24px;
  box-shadow:var(--shadow);overflow:hidden;z-index:20}
#app.preview .levelpick{bottom:250px}
#app.nav .levelpick{bottom:150px}
.levelpick button{width:44px;height:44px;font-size:15px;font-weight:700;color:var(--gray);position:relative}
.levelpick button.on{background:var(--selbg);color:var(--blue)}
.levelpick button .dot{position:absolute;left:50%;transform:translateX(-50%);bottom:5px;width:4px;height:4px;
  border-radius:99px;background:var(--blue);opacity:0}
.levelpick button.hasroute .dot{opacity:1}

.report{position:absolute;right:12px;bottom:148px;z-index:20;display:flex;align-items:center;gap:9px;
  background:var(--surface);border-radius:28px;padding:13px 20px 13px 15px;font-size:16px;font-weight:500;
  color:var(--ink);box-shadow:var(--shadow)}
.recenter{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;z-index:20;background:var(--surface);
  border-radius:22px;padding:11px 20px;font-size:14px;font-weight:500;color:var(--blue);box-shadow:var(--shadow)}

/* ---------- preview: search card ---------- */
.topui{position:absolute;left:10px;right:10px;top:max(10px, env(safe-area-inset-top));z-index:30;
  display:flex;flex-direction:column;gap:10px}
.searchcard{position:relative;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);
  padding:6px 12px;display:grid;grid-template-columns:34px 1fr 40px;align-items:center}
.pins{display:flex;flex-direction:column;align-items:center;align-self:stretch;padding:16px 0 13px;justify-content:space-between}
.odot{width:13px;height:13px;border-radius:50%;border:4px solid var(--blue);background:var(--surface)}
.pdots{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;padding:3px 0}
.pdots i{width:3px;height:3px;border-radius:50%;background:#BDC1C6}
.fields{display:flex;flex-direction:column}
.fields input{border:none;outline:none;font:inherit;font-size:16px;color:var(--ink);padding:12px 4px;width:100%;background:none}
.fields input::placeholder{color:#80868B}
#fromInput{color:var(--blue);font-weight:400}
.fsep{height:1px;background:var(--line)}
#swapBtn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:var(--gray);justify-self:end}
#swapBtn:active{background:var(--chipbg)}
.suggest{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border-radius:14px;
  box-shadow:var(--shadow);overflow:hidden auto;max-height:44vh;display:none;z-index:40}
.suggest.open{display:block}
.suggest button{display:flex;align-items:center;gap:14px;width:100%;padding:10px 16px;text-align:left}
.suggest button:active{background:var(--chipbg)}
.sic{flex:none;width:38px;height:38px;border-radius:50%;background:var(--chipbg);display:grid;place-items:center;color:var(--gray)}
.sname{font-size:15px;color:var(--ink)}
.ssub{font-size:12.5px;color:var(--gray);margin-top:1px}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chips button{flex:none;background:var(--surface);border-radius:18px;padding:8px 14px;font-size:13px;font-weight:500;
  color:var(--ink);box-shadow:0 1px 2px rgba(60,64,67,.3)}

/* ---------- preview: bottom sheet ---------- */
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:25;background:var(--surface);border-radius:16px 16px 0 0;
  box-shadow:0 -1px 12px rgba(0,0,0,.18);padding:0 16px calc(10px + env(safe-area-inset-bottom))}
.grab{width:100%;padding:8px 0 4px;display:grid;place-items:center}
.grab i{width:34px;height:4px;border-radius:99px;background:var(--border)}
.sheethead{display:flex;align-items:center;justify-content:space-between;padding:2px 0 6px}
.stitle{font-size:22px;font-weight:400}
.xbtn{width:36px;height:36px;border-radius:50%;background:var(--chipbg);display:grid;place-items:center;color:var(--gray)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:0 -16px;padding:0 12px}
.tabs button{padding:10px 14px;font-size:14px;font-weight:500;color:var(--gray);border-bottom:3px solid transparent;
  display:flex;align-items:center;gap:6px}
.tabs button b{font-weight:500}
.tabs button.on{color:var(--blue);border-bottom-color:var(--blue)}
.etarow{padding:12px 0 4px;display:flex;align-items:flex-start;gap:14px}
.big{font-size:26px;font-weight:500;color:var(--amber);line-height:1.15}
.sub{font-size:14px;color:var(--gray);margin-top:2px;line-height:1.35}
.actions{display:flex;gap:10px;padding:10px 0 6px;align-items:center}
.startbtn{display:flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border-radius:24px;
  padding:12px 22px;font-size:15px;font-weight:500;box-shadow:0 1px 3px rgba(26,115,232,.4)}
.startbtn:disabled{background:var(--startdis);box-shadow:none}
.chip{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:24px;padding:11px 16px;
  font-size:14px;font-weight:500;color:var(--blue);background:var(--surface)}
.stepswrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease;margin:0 -16px;padding:0 16px}
.stepsinner{overflow:hidden;min-height:0}
.sheet.expanded .stepswrap{grid-template-rows:1fr}
.sheet.expanded .stepsinner{max-height:44vh;overflow-y:auto}
.steps{list-style:none}
.steps li{display:flex;align-items:center;gap:14px;padding:12px 2px;border-top:1px solid var(--line);font-size:14px}
.steps li .mic{flex:none;width:26px;color:var(--gray)}
.steps li.now{background:var(--selbg);border-radius:10px;margin:0 -8px;padding:12px 10px}
.steps li.now .mic{color:var(--blue)}
.steps li .stx{flex:1}
.steps li .stx small{display:block;color:var(--gray);font-size:12px;margin-top:1px}
.steps li .sd{color:var(--gray);font-size:12.5px;white-space:nowrap}
.ops{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;border-top:1px solid var(--line)}
.ops button{font-size:12.5px;font-weight:500;color:var(--gray);border:1px solid var(--border);border-radius:16px;padding:7px 12px}
.ops button.on{background:#FCE8E6;border-color:var(--red);color:#C5221F}

/* ---------- nav: banner ---------- */
.navbanner{position:absolute;left:10px;right:10px;top:max(10px, env(safe-area-inset-top));z-index:30}
.bmain{background:var(--teal);border-radius:16px;box-shadow:var(--shadow);display:flex;align-items:center;
  gap:16px;padding:16px 18px;color:#fff}
.micon{flex:none;width:46px;height:46px}
.micon svg{width:100%;height:100%}
.bbig{font-size:27px;font-weight:500;line-height:1.1;letter-spacing:.01em}
.bbig.small{font-size:20px}
.bsub{font-size:14.5px;color:rgba(255,255,255,.85);margin-top:3px}
.thenchip{position:absolute;top:100%;left:0;background:var(--teal);color:#fff;font-size:16px;font-weight:500;
  border-radius:0 0 14px 14px;padding:9px 16px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.thenchip svg{width:22px;height:22px}

/* ---------- nav: bottom sheet ---------- */
.navsheet{position:absolute;left:0;right:0;bottom:0;z-index:25;background:var(--surface);border-radius:20px 20px 0 0;
  box-shadow:0 -1px 12px rgba(0,0,0,.18);padding:0 14px calc(16px + env(safe-area-inset-bottom))}
.nrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:2px}
.nbtns{display:flex;align-items:center;gap:10px}
.roundbtn{width:48px;height:48px;border-radius:50%;background:var(--chipbg);display:grid;place-items:center;color:var(--ink)}
.exitbtn{background:var(--red);color:#fff;font-size:16px;font-weight:500;border-radius:26px;padding:14px 24px}

/* ---------- 3D POV + settings ---------- */
#povBtn{font-size:15px;font-weight:700;color:var(--blue)}
#fpv{position:absolute;inset:0;width:100%;height:100%;display:none;pointer-events:none;background:var(--sky)}
#app.nav.threed #fpv{display:block}
#app.nav.threed .recenter{display:none}
#settingsBtn{position:absolute;right:12px;top:max(212px, calc(env(safe-area-inset-top) + 202px));z-index:20}
.setpop{position:absolute;right:74px;top:max(212px, calc(env(safe-area-inset-top) + 202px));z-index:35;
  background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:4px 16px;min-width:210px;color:var(--ink)}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 0;font-size:15px}
.swtch{position:relative;width:46px;height:26px;border-radius:15px;background:var(--border);transition:background .2s;flex:none}
.swtch i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--surface);
  transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.swtch.on{background:var(--blue)}
.swtch.on i{left:23px}

/* ---------- toast ---------- */
.toast{position:absolute;left:50%;bottom:200px;transform:translateX(-50%) translateY(14px);opacity:0;z-index:60;
  background:#202124;color:#fff;font-size:13.5px;padding:11px 18px;border-radius:24px;pointer-events:none;
  transition:all .25s ease;max-width:88vw;text-align:center;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(prefers-reduced-motion:no-preference){
  .flow{animation:flow 1.1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-30}}
}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
</style>
</head>
<body>
<div id="app" class="preview">
  <div id="mapwrap"><svg id="map" role="img" aria-label="Map of Nila Square"></svg></div>
  <svg id="fpv" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>

  <!-- floating -->
  <div class="levelpick" role="group" aria-label="Floor">
    <button id="fs1" aria-label="Level 1">1<span class="dot"></span></button>
    <button id="fsG" class="on" aria-label="Ground floor">G<span class="dot"></span></button>
  </div>
  <button class="fab previewonly" id="layersBtn" aria-label="Map layers">
    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 3 3 9l9 6 9-6-9-6z" fill="currentColor"/><path d="m4.5 12.5 7.5 5 7.5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="fab previewonly" id="settingsBtn" aria-label="Settings">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.48.48 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
  </button>
  <div class="setpop previewonly" id="setPop" hidden>
    <div class="setrow">Dark mode
      <button class="swtch" id="darkSw" role="switch" aria-checked="false" aria-label="Dark mode"><i></i></button>
    </div>
  </div>
  <div class="fabstack navonly">
    <button class="fab" id="povBtn" aria-label="Toggle 3D first-person view">3D</button>
    <button class="fab" id="compassBtn" aria-label="Compass">
      <svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 2.5 15 12h-6z" fill="#EA4335"/><path d="M12 21.5 9 12h6z" fill="#9AA0A6"/></svg>
    </button>
    <button class="fab" id="searchFab" aria-label="Search">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.2"/><path d="M15.3 15.3 21 21"/></svg>
    </button>
    <button class="fab" id="soundBtn" aria-label="Voice guidance">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/><rect id="muteA" x="16.5" y="6.5" width="2.6" height="7" rx="1.3" fill="currentColor"/><circle id="muteB" cx="17.8" cy="17" r="1.6" fill="currentColor"/></svg>
    </button>
  </div>
  <button class="report navonly" id="reportBtn">
    <svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 3.2 22 20H2z" fill="none" stroke="#F9AB00" stroke-width="2.2" stroke-linejoin="round"/><path d="M12 10v4M10 12h4" stroke="#F9AB00" stroke-width="2" stroke-linecap="round"/></svg>
    Report
  </button>
  <button class="recenter navonly" id="recenterBtn" hidden>Re-center</button>

  <!-- preview: search -->
  <div class="topui previewonly">
    <div class="searchcard">
      <div class="pins">
        <span class="odot" aria-hidden="true"></span>
        <span class="pdots" aria-hidden="true"><i></i><i></i><i></i></span>
        <svg width="17" height="22" viewBox="0 0 24 30" aria-hidden="true"><path d="M12 29C19 20 22 16 22 10.5A10 10 0 1 0 2 10.5C2 16 5 20 12 29z" fill="#EA4335"/><circle cx="12" cy="10.5" r="3.6" fill="#7B1113"/></svg>
      </div>
      <div class="fields">
        <input id="fromInput" autocomplete="off" placeholder="Your location" aria-label="Start">
        <div class="fsep"></div>
        <input id="toInput" autocomplete="off" placeholder="Choose destination" aria-label="Destination">
      </div>
      <button id="swapBtn" aria-label="Swap start and destination">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v14M7 18l-3.5-3.5M7 18l3.5-3.5M17 20V6M17 6l-3.5 3.5M17 6l3.5 3.5"/></svg>
      </button>
      <div class="suggest" id="fromDrop"></div>
      <div class="suggest" id="toDrop"></div>
    </div>
    <div class="chips">
      <button data-from="ent_main" data-to="zara">Main entrance → Zara</button>
      <button data-from="ent_park" data-to="pvr">Parking → PVR</button>
      <button data-from="starbucks" data-to="crossword">Starbucks → Crossword</button>
      <button data-from="ent_main" data-to="foodcourt">Entrance → Food Court</button>
    </div>
  </div>

  <!-- preview: bottom sheet -->
  <div class="sheet previewonly" id="sheet">
    <button class="grab" id="grab" aria-label="Expand directions"><i></i></button>
    <div class="sheethead">
      <span class="stitle">Walk</span>
      <button class="xbtn" id="clearBtn" aria-label="Clear route">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 5 19 19M19 5 5 19"/></svg>
      </button>
    </div>
    <div class="tabs" role="group" aria-label="Route type">
      <button id="tabFast" class="on">Fastest <b id="tFast"></b></button>
      <button id="tabLift">Step-free <b id="tLift"></b></button>
    </div>
    <div class="etarow">
      <div>
        <div class="big" id="pTime">–</div>
        <div class="sub" id="pSub">Choose a start and destination</div>
      </div>
    </div>
    <div class="actions">
      <button class="startbtn" id="startBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 3 20 21l-8-4.5L4 21z" fill="#fff"/></svg>
        Start
      </button>
      <button class="chip" id="stopsBtn">＋ Add stops</button>
      <button class="chip" id="saveBtn">Save</button>
    </div>
    <div class="stepswrap"><div class="stepsinner">
      <ol class="steps" id="stepsList"></ol>
      <div class="ops">
        <button id="breakEsc">Mark escalator out of service</button>
        <button id="resetBtn">Reset demo</button>
      </div>
    </div></div>
  </div>

  <!-- nav chrome -->
  <div class="navbanner navonly">
    <div class="bmain">
      <span class="micon" id="bIcon"></span>
      <div>
        <div class="bbig" id="bMain">–</div>
        <div class="bsub" id="bSub"></div>
      </div>
    </div>
    <div class="thenchip" id="thenChip" hidden>Then <span id="thenIcon"></span></div>
  </div>
  <div class="navsheet navonly">
    <button class="grab" aria-hidden="true"><i></i></button>
    <div class="nrow">
      <div>
        <div class="big" id="nTime">–</div>
        <div class="sub" id="nSub"></div>
      </div>
      <div class="nbtns">
        <button class="roundbtn" id="altBtn" aria-label="Route overview">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-5c0-2.5-4-2.5-4-5V8M12 16c0-2.5 4-2.5 4-5V8"/><path d="M5.5 8.5 8 5l2.5 3.5M13.5 8.5 16 5l2.5 3.5"/></svg>
        </button>
        <button class="exitbtn" id="exitBtn">Exit</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>
</div>

<script>
'use strict';
/* ---------- Venue data (plan units: 100 x 64) ---------- */
const CAT = {
  fashion:{ink:'#20486F',lite:'#AEC4E4'}, food:{ink:'#6B4A0F',lite:'#E4C48C'}, electronics:{ink:'#463579',lite:'#C0B5E3'},
  leisure:{ink:'#7A2E50',lite:'#DFAEC4'}, services:{ink:'#255C34',lite:'#AFD2B7'}, anchor:{ink:'#57503E',lite:'#CBC2AE'}
};
const inkFor = c => document.documentElement.dataset.theme==='dark' ? CAT[c].lite : CAT[c].ink;
const SHOPS = {

  edges.push({a,b,w:Math.hypot(A.x-B.x,A.y-B.y)*( type==='lift'?1.6 : type==='escalator'?1.2 : 1),type:type||'walk'}); }

function dijkstra(src,dst,allow){
  const dist={[src]:0}, prev={}, seen=new Set(), q=[src];
  while(q.length){
    q.sort((a,b)=>dist[a]-dist[b]);
    const u=q.shift(); if(u===dst) break;
    if(seen.has(u)) continue; seen.add(u);
    (adj[u]||[]).forEach(e=>{
      if(!allow(e)) return;
      const v = e.a===u?e.b:e.a;
      const nd = dist[u]+e.w;
      if(nd < (dist[v]??Infinity)){ dist[v]=nd; prev[v]={node:u,edge:e}; if(!seen.has(v)) q.push(v); }
    });
  }
  if(dist[dst]===undefined) return null;
  const path=[]; let cur=dst;
  while(cur){ path.unshift(cur); cur = prev[cur]?prev[cur].node:null; }
  return {path, dist:dist[dst]};
}

/* ---------- Routing + steps ---------- */
function poiNode(p){ return p.ent ? 'G_p_'+p.id : p.floor+'_p_'+p.id; }
function pathLen(pts,i0,i1){ let L=0; for(let i=i0+1;i<=i1;i++) L+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); return L*1.1; }
function computeRoute(){
  const from=poiById(state.fromId), to=poiById(state.toId);
  if(!from||!to||from.id===to.id) return null;
  const allow = e=>{
    if(e.type==='escalator' && state.escDown) return false;
    if(state.pref==='lift' && e.type==='escalator') return false;
    return true;
  };
  const r = dijkstra(poiNode(from), poiNode(to), allow);
  if(!r) return null;
  const pts = r.path.map(id=>nodes[id]);
  const segs=[]; let cur={floor:pts[0].floor, pts:[pts[0]]}; let via=null;
  for(let i=1;i<pts.length;i++){
    if(pts[i].floor!==cur.floor){
      via = pts[i-1].id.includes('lift')?'lift':'escalator';
      segs.push(cur); cur={floor:pts[i].floor, pts:[pts[i]]};
    } else cur.pts.push(pts[i]);
  }
  segs.push(cur);
  return {from,to,pts,segs,via,dist:r.dist,steps:buildSteps(pts,from,to)};
}
function nearestShopName(x,y,floor){
  let best=null,bd=1e9;
  SHOPS[floor].forEach(s=>{
    const d=Math.hypot(s.x+s.w/2-x, (s.y<32?26:38)-y);
    if(d<bd){bd=d;best=s.name;}
  });
  return best;
}
function turnDir(v1,v2){ const c=v1.x*v2.y-v1.y*v2.x; return c>0?'right':'left'; }
function buildSteps(pts,from,to){
  const v0={x:pts[1].x-pts[0].x, y:pts[1].y-pts[0].y};
  const card = Math.abs(v0.x)>=Math.abs(v0.y) ? (v0.x>0?'east':'west') : (v0.y>0?'south':'north');
  const steps=[{t:'start', idx:0, icon:'straight', main:'Head '+card, sub:'toward '+to.name}];
  for(let i=1;i<pts.length-1;i++){
    const a=pts[i-1],b=pts[i],c=pts[i+1];
    if(b.floor!==c.floor){
      const conn = b.id.includes('lift')?'lift':'escalator';
      const up = c.floor==='L1';
      steps.push({t:'floor', idx:i, conn, floor:c.floor,
        icon: conn==='lift'?'lift':(up?'escup':'escdown'),
        main:'Take the '+conn+' '+(up?'up':'down'), sub:'to '+FLOOR_LABEL[c.floor]});
      i++; continue;
    }
    const v1={x:b.x-a.x,y:b.y-a.y}, v2={x:c.x-b.x,y:c.y-b.y};
    const cross=v1.x*v2.y-v1.y*v2.x;
    if(Math.abs(cross)>0.01 && (adj[b.id]||[]).length>2){
      const dir=turnDir(v1,v2);
      steps.push({t:'turn', idx:i, icon:dir, main:'Turn '+dir, sub:'at '+nearestShopName(b.x,b.y,b.floor)});
    }
  }
  const n=pts.length, last=pts[n-1], prev=pts[n-2];
  let side='';
  if(to.shop){
    const v={x:last.x-prev.x,y:last.y-prev.y}, u={x:to.cx-prev.x,y:(to.side==='top'?20:44)-prev.y};
    if(Math.abs(v.x)+Math.abs(v.y)>0.01) side=' · on your '+turnDir(v,u);
  }
  steps.push({t:'arrive', idx:n-1, icon:'arrive', main:'Arrive', sub:to.name+side});
  for(let i=0;i<steps.length-1;i++) steps[i].d = Math.round(pathLen(pts, steps[i].idx, steps[i+1].idx));
  return steps;
}

    if(Math.abs(dx)+Math.abs(dy)>1){ cam.x-=dx*k; cam.y-=dy*k; userPanned(); applyCam(); }
  } else if(ptrs.size===2){
    const other=[...ptrs.entries()].find(([id])=>id!==e.pointerId)[1];
    const d0=Math.hypot(p.x-other.x,p.y-other.y), d1=Math.hypot(e.clientX-other.x,e.clientY-other.y);
    if(d0>0&&d1>0){ cam.w=Math.min(1800,Math.max(130,cam.w*d0/d1)); userPanned(); applyCam(); }
  }
  p.x=e.clientX; p.y=e.clientY;
});
['pointerup','pointercancel'].forEach(ev=>mapwrap.addEventListener(ev,e=>ptrs.delete(e.pointerId)));
mapwrap.addEventListener('wheel',e=>{
  e.preventDefault();
  cam.w=Math.min(1800,Math.max(130,cam.w*(e.deltaY>0?1.15:0.87)));
  userPanned(); applyCam();
},{passive:false});
window.addEventListener('resize',applyCam);
function userPanned(){

function placeCar(pt,ang){

/* ---------- First-person 3D view ---------- */
const fpv=document.getElementById('fpv');
const FW=1000,FH=640,FHOR=245,FOC=500,CAMH=4.2,CAMBACK=7,BH=5,FEPS=0.6;
function renderFPV(){
  if(!(state.mode3d&&state.mode==='nav'&&state.route)) return;
  const f={x:state.fdx||1,y:state.fdy||0}, r={x:-f.y,y:f.x};
  const camx=state.px-f.x*CAMBACK, camy=state.py-f.y*CAMBACK;
  const toCam=p=>{ const ex=p.x-camx,ey=p.y-camy; return {z:ex*f.x+ey*f.y, x:ex*r.x+ey*r.y}; };
  const sx=c=>FW/2 + c.x*FOC/c.z;
  const sy=(c,h)=>FHOR + (CAMH-(h||0))*FOC/c.z;
  fpv.innerHTML='';
  el('rect',{x:0,y:0,width:FW,height:FHOR,fill:'var(--sky)'},fpv);
  el('rect',{x:0,y:FHOR,width:FW,height:FH-FHOR,fill:'var(--fpfloor)'},fpv);

  // route ribbon ahead of the marker
  const pts=state.route.pts, hw=1.1;
  const ahead=[{x:state.px,y:state.py}];
  for(let i=state.nextIdx;i<pts.length;i++){ if(pts[i].floor!==state.floor) break; ahead.push(pts[i]); }
  if(ahead.length>1){
    const Lp=[],Rp=[];
    for(let j=0;j<ahead.length;j++){
      const a=ahead[Math.max(0,j-1)], b=ahead[Math.min(ahead.length-1,j+1)];
      let dx=b.x-a.x, dy=b.y-a.y; const dl=Math.hypot(dx,dy)||1; dx/=dl; dy/=dl;
      Lp.push({x:ahead[j].x-dy*hw, y:ahead[j].y+dx*hw});
      Rp.push({x:ahead[j].x+dy*hw, y:ahead[j].y-dx*hw});
    }
    const poly=[];
    Lp.forEach(p=>{const c=toCam(p); if(c.z>FEPS) poly.push(sx(c)+','+sy(c,0));});
    Rp.reverse().forEach(p=>{const c=toCam(p); if(c.z>FEPS) poly.push(sx(c)+','+sy(c,0));});
    if(poly.length>2) el('polygon',{points:poly.join(' '),fill:'var(--nav-route)',opacity:'0.92',
      stroke:'var(--nav-route-dk)','stroke-width':'3','stroke-linejoin':'round'},fpv);
  }

  // storefront faces along the corridor, painted far -> near
  const faces=[];
  SHOPS[state.floor].forEach(s=>{
    const yF = s.y<32 ? s.y+s.d : s.y;
    faces.push({a:{x:s.x,y:yF}, b:{x:s.x+s.w,y:yF}, name:s.name, ink:inkFor(s.cat), h:BH});
  });
  faces.push({a:{x:46,y:40},b:{x:54,y:40},name:'Escalator',ink:'var(--conink)',h:2.6});
  faces.push({a:{x:46,y:48},b:{x:54,y:48},name:'Lift',ink:'var(--conink)',h:2.6});
  const drawn=[];
  faces.forEach(fc=>{
    let A=toCam(fc.a), B=toCam(fc.b);
    if(A.z<=FEPS&&B.z<=FEPS) return;
    if(A.z<FEPS){ const t=(FEPS-A.z)/(B.z-A.z); A={z:FEPS,x:A.x+(B.x-A.x)*t}; }
    if(B.z<FEPS){ const t=(FEPS-B.z)/(A.z-B.z); B={z:FEPS,x:B.x+(A.x-B.x)*t}; }
    drawn.push({A,B,fc,key:Math.min(A.z,B.z)});
  });
  drawn.sort((p,q)=>q.key-p.key);
  drawn.forEach(d=>{
    const {A,B,fc}=d;
    const x1=sx(A),y1=sy(A,0),x2=sx(B),y2=sy(B,0),x3=sx(B),y3=sy(B,fc.h),x4=sx(A),y4=sy(A,fc.h);
    if(Math.max(x1,x2)<-100||Math.min(x1,x2)>FW+100) return;
    const fog=Math.max(0.25,Math.min(1,1.15-d.key/80));
    const g=el('g',{opacity:fog},fpv);
    el('polygon',{points:`${x1},${y1} ${x2},${y2} ${x3},${y3} ${x4},${y4}`,
      fill:'var(--fpface)',stroke:'var(--fpstroke)','stroke-width':'2','stroke-linejoin':'round'},g);
    const mz=(A.z+B.z)/2, fs=Math.min(46,300/mz);
    if(fs>=9){
      const mx=(x1+x2)/2, top=(y3+y4)/2, bot=(y1+y2)/2;
      el('text',{x:mx,y:top+(bot-top)*0.34,'text-anchor':'middle','font-size':fs,'font-weight':'700',
        fill:fc.ink,'font-family':'Roboto,sans-serif','letter-spacing':'0.05em'},g).textContent=fc.name;
    }
  });

  // destination pin
  const dest=pts[pts.length-1];
  if(dest.floor===state.floor){
    const c=toCam(dest);
    if(c.z>FEPS){
      const sc=Math.min(3.2, 26/c.z+0.6);
      const pin=el('g',{transform:`translate(${sx(c)} ${sy(c,0)}) scale(${sc})`},fpv);
      el('path',{d:'M0 0C7-9 10-12.4 10-18a10 10 0 1 0-20 0C-10-12.4-7-9 0 0z',fill:'#EA4335',stroke:'#fff','stroke-width':'1.4'},pin);
      el('circle',{cx:0,cy:-17.5,r:3.4,fill:'#7B1113'},pin);
    }
  }

  // you, centered ahead of the camera
  const me=el('g',{transform:`translate(${FW/2} ${FHOR+CAMH*FOC/CAMBACK})`},fpv);
  el('circle',{r:36,fill:'#4285F4',opacity:'0.18'},me);
  el('circle',{r:19,fill:'#fff'},me);
  el('path',{d:'M0 -12.5 L11 9.5 L0 4.4 L-11 9.5 Z',fill:'#1A73E8'},me);
}

/* ---------- Walkthrough engine ---------- */
let anim=null;
function animateAlong(i0,i1,done){
  const pts=state.route.pts.slice(i0,i1+1);
  placeCar(pts[0]);
  state.nextIdx=i0+1;
  const lens=[]; let total=0;
  for(let i=1;i<pts.length;i++){ const L=Math.hypot((pts[i].x-pts[i-1].x)*S,(pts[i].y-pts[i-1].y)*K); lens.push(L); total+=L; }
  if(total===0){ state.moving=false; done&&done(); return; }
  state.moving=true;
  const dur=Math.max(700,total*9), t0=performance.now();
  function frame(now){
    const t=Math.min(1,(now-t0)/dur), dist=t*total; let acc=0,i=0;
    while(i<lens.length && acc+lens[i]<dist){acc+=lens[i];i++;}
    const p0=pts[i], p1=pts[Math.min(i+1,pts.length-1)];
    const f=lens[i]?(dist-acc)/lens[i]:0;
    const wx=p0.x+(p1.x-p0.x)*f, wy=p0.y+(p1.y-p0.y)*f;
    state.px=wx; state.py=wy; state.nextIdx=i0+i+1;
    const vx=p1.x-p0.x, vy=p1.y-p0.y, vl=Math.hypot(vx,vy);
    if(vl>0.001){ // ponytail: exponential smoothing so FPV turns sweep instead of snapping
      const a=0.16;
      state.fdx+=(vx/vl-state.fdx)*a; state.fdy+=(vy/vl-state.fdy)*a;
      const fl=Math.hypot(state.fdx,state.fdy)||1; state.fdx/=fl; state.fdy/=fl;
    }
    const ang=Math.atan2(state.fdy*K,state.fdx*S)*180/Math.PI+90;
    setCar(wx*S, wy*K, ang);
    if(t<1){ anim=requestAnimationFrame(frame); }
    else{ state.moving=false; done&&done(); }
  }
  anim=requestAnimationFrame(frame);
}
function goNext(done){
  const r=state.route; if(!r||state.moving) return;
  const steps=r.steps;
  if(state.ck>=steps.length-1){ done&&done(); return; }
  const cur=steps[state.ck], nxt=steps[state.ck+1];
  const finish=()=>{
    state.ck++;
    updateBanner(); updateNavSheet(); highlightStep(state.ck);
    if(nxt.t==='floor') toast('Now heading to '+FLOOR_LABEL[nxt.floor]);
    if(nxt.t==='arrive'){
      state.playing=false;
      toast('You have arrived at '+r.to.name);
      setTimeout(()=>{ if(state.mode==='nav') exitNav(); }, 2600);
    }
    done&&done();
  };
  if(cur.t==='floor'){
    const startIdx=cur.idx+1;
    placeCar(r.pts[startIdx]);
    state.nextIdx=startIdx+1;
    const q0=r.pts[startIdx], q1=r.pts[Math.min(startIdx+1,r.pts.length-1)];
    const dl=Math.hypot(q1.x-q0.x,q1.y-q0.y)||1;
    state.fdx=(q1.x-q0.x)/dl; state.fdy=(q1.y-q0.y)/dl;
    if(state.follow&&!state.mode3d){ cam.x=r.pts[startIdx].x*S; cam.y=r.pts[startIdx].y*K; applyCam(); }
    toast('Now on '+FLOOR_LABEL[r.pts[startIdx].floor]);
    animateAlong(startIdx, nxt.idx, finish);
  } else {
    animateAlong(cur.idx, nxt.idx, finish);
  }
}
function autoplay(){
  if(!state.playing||state.mode!=='nav') return;
  if(state.ck>=state.route.steps.length-1) return;
  goNext(()=>{
    const pause = state.route.steps[state.ck].t==='floor' ? 1500 : 700;
    setTimeout(autoplay, pause);
  });
}

/* ---------- Nav chrome ---------- */
function bannerStep(){

function updateBanner(){

function updateNavSheet(){

/* ---------- Preview sheet ---------- */

/* ---------- Search ---------- */
const TOP_PICKS=['ent_main','ent_park','zara','starbucks','pvr','foodcourt'];
function matches(q){
  q=q.trim().toLowerCase();
  if(!q) return TOP_PICKS.map(poiById);
  const starts=[],inc=[],tag=[];
  POIS.forEach(p=>{
    const n=p.name.toLowerCase();
    if(n.startsWith(q)) starts.push(p);
    else if(n.includes(q)) inc.push(p);
    else if(p.tags.some(t=>t.startsWith(q)||t.includes(q))) tag.push(p);
  });
  return [...starts,...inc,...tag].slice(0,6);
}
const SIC='<svg width="18" height="18" viewBox="0 0 24 30" fill="none"><path d="M12 28C18.5 20 21.5 16 21.5 10.5A9.5 9.5 0 1 0 2.5 10.5C2.5 16 5.5 20 12 28z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="10.5" r="3" fill="currentColor"/></svg>';
function bindSearch(inputId,dropId,key){
  const input=document.getElementById(inputId), drop=document.getElementById(dropId);
  function show(){
    const res=matches(input.value);
    drop.innerHTML='';
    if(!res.length){ drop.classList.remove('open'); return; }
    res.forEach(p=>{
      const b=document.createElement('button');
      b.innerHTML='<span class="sic">'+SIC+'</span><span><span class="sname">'+p.name+'</span><span class="ssub">'+FLOOR_LABEL[p.floor]+' · Nila Square</span></span>';
      b.addEventListener('click',()=>{
        state[key]=p.id; input.value=p.name; drop.classList.remove('open');
        if(state.fromId&&state.toId) navigate(false);
      });
      drop.appendChild(b);
    });
    drop.classList.add('open');
  }
  input.addEventListener('input',()=>{ state[key]=null; show(); });
  input.addEventListener('focus',show);
  input.addEventListener('blur',()=>setTimeout(()=>drop.classList.remove('open'),180));
}
bindSearch('fromInput','fromDrop','fromId');
bindSearch('toInput','toDrop','toId');

  state.ck=0;
  buildMap(); markFloorDots(); renderPreviewSheet();

  b.textContent=state.escDown?'Escalator out of service — tap to restore':'Mark escalator out of service';
  navigate(false);
  toast(state.escDown?'Escalator removed from routing for every visitor':'Escalator restored — routes updated');
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  state.escDown=false; state.pref='fast';
  const b=document.getElementById('breakEsc'); b.classList.remove('on'); b.textContent='Mark escalator out of service';
  document.getElementById('tabFast').classList.add('on'); document.getElementById('tabLift').classList.remove('on');
  setPoi('fromId','fromInput','ent_main'); setPoi('toId','toInput','zara');
  navigate(false); fitOverview(600); toast('Demo reset');
});

/* ---------- Boot ---------- */
setPoi('fromId','fromInput','ent_main');
setPoi('toId','toInput','zara');
let savedTheme=null; try{savedTheme=localStorage.getItem('nila-theme')}catch(e){}
if(savedTheme==='dark'||(!savedTheme&&matchMedia('(prefers-color-scheme: dark)').matches)) setTheme(true);
navigate(false);
applyCam();
</script>
</body>
</html>
